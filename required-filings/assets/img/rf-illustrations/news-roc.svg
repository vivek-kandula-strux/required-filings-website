<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220" role="img" aria-label="ROC deadlines article cover">
  <defs>
    <linearGradient id="nrBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a1929"/>
      <stop offset="1" stop-color="#1a3c8c"/>
    </linearGradient>
  </defs>
  <rect width="400" height="220" fill="url(#nrBg)" rx="12"/>
  <g stroke="#ffffff" stroke-opacity="0.06" stroke-width="1">
    <path d="M0 55 H400 M0 110 H400 M0 165 H400"/>
  </g>
  <text x="32" y="48" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="700" fill="#86b7ff" letter-spacing="2">FILING CALENDAR</text>
  <text x="32" y="92" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="800" fill="#ffffff">ROC</text>
  <text x="32" y="130" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#cdd9f1">Annual filing deadlines</text>
  <text x="32" y="152" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#cdd9f1">&amp; penalties</text>
  <!-- Floating calendar icon -->
  <g transform="translate(280 50)">
    <rect x="0" y="14" width="100" height="116" rx="8" fill="#ffffff"/>
    <rect x="0" y="14" width="100" height="28" rx="8" fill="#3461d6"/>
    <rect y="32" width="100" height="10" fill="#3461d6"/>
    <rect x="14" y="6" width="6" height="20" rx="2" fill="#0a1929"/>
    <rect x="80" y="6" width="6" height="20" rx="2" fill="#0a1929"/>
    <!-- Calendar grid -->
    <g fill="#7a8aa8" fill-opacity="0.5">
      <rect x="14" y="54" width="10" height="10" rx="2"/>
      <rect x="30" y="54" width="10" height="10" rx="2"/>
      <rect x="46" y="54" width="10" height="10" rx="2"/>
      <rect x="62" y="54" width="10" height="10" rx="2"/>
      <rect x="78" y="54" width="10" height="10" rx="2"/>
      <rect x="14" y="70" width="10" height="10" rx="2"/>
      <rect x="46" y="70" width="10" height="10" rx="2"/>
      <rect x="62" y="70" width="10" height="10" rx="2"/>
      <rect x="78" y="70" width="10" height="10" rx="2"/>
    </g>
    <!-- Highlighted deadline -->
    <rect x="28" y="68" width="14" height="14" rx="3" fill="#ef4444"/>
    <text x="35" y="78" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="8" font-weight="700" fill="#ffffff">30</text>
    <rect x="14" y="92" width="76" height="6" rx="3" fill="#0a1929"/>
    <rect x="14" y="104" width="60" height="4" rx="2" fill="#7a8aa8"/>
    <rect x="14" y="114" width="50" height="4" rx="2" fill="#7a8aa8"/>
  </g>
</svg>
