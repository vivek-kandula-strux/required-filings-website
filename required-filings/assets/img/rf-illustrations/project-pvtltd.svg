  </defs>
  <rect width="400" height="300" fill="url(#pvtBg)" rx="12"/>
  <g stroke="#4f8cff" stroke-opacity="0.08" stroke-width="1">
    <path d="M0 75 H400 M0 150 H400 M0 225 H400"/>
  </g>
  <!-- Building / company icon -->
  <g transform="translate(140 70)">
