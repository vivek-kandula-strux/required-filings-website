    <rect x="40" y="55" width="20" height="20" rx="2" fill="#0a1929" fill-opacity="0.4"/>
    <rect x="70" y="55" width="20" height="20" rx="2" fill="#0a1929" fill-opacity="0.4"/>
    <rect x="100" y="55" width="10" height="20" rx="2" fill="#0a1929" fill-opacity="0.4"/>
    <rect x="10" y="85" width="20" height="20" rx="2" fill="#0a1929" fill-opacity="0.4"/>
    <rect x="40" y="85" width="20" height="20" rx="2" fill="#0a1929" fill-opacity="0.4"/>
    <rect x="70" y="85" width="20" height="20" rx="2" fill="#0a1929" fill-opacity="0.4"/>
    <rect x="100" y="85" width="10" height="20" rx="2" fill="#0a1929" fill-opacity="0.4"/>
