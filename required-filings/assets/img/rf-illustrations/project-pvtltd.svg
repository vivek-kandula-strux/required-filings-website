    <text x="38" y="23" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#86efac">Registered</text>
  </g>
  <text x="380" y="265" text-anchor="end" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="600" fill="#5d9fff">PVT LTD · SPICe+</text>
