<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 110" role="img" aria-label="On-time stat tile">
  <defs>
    <linearGradient id="hbsAccent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5d9fff"/>
      <stop offset="1" stop-color="#1a3c8c"/>
    </linearGradient>
  </defs>
  <rect width="240" height="110" rx="20" fill="url(#hbsAccent)"/>
  <text x="22" y="36" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="700" fill="#cdd9f1" letter-spacing="1.5">ON-TIME RATE</text>
  <text x="22" y="74" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800" fill="#ffffff">[TBD]%</text>
  <text x="22" y="96" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="500" fill="#cdd9f1">filings before deadline</text>
  <!-- Trend arrow -->
  <g transform="translate(170 26)" stroke="#86efac" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <polyline points="0,40 18,28 30,34 50,12"/>
    <polyline points="38,12 50,12 50,24"/>
  </g>
</svg>
