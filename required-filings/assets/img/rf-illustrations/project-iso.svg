<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" role="img" aria-label="ISO certification project">
  <defs>
    <linearGradient id="isoBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a3c8c"/>
      <stop offset="1" stop-color="#0a1929"/>
    </linearGradient>
    <linearGradient id="isoAccent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fcd34d"/>
      <stop offset="1" stop-color="#d97706"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#isoBg)" rx="12"/>
  <g stroke="#4f8cff" stroke-opacity="0.08" stroke-width="1">
    <path d="M0 75 H400 M0 150 H400 M0 225 H400"/>
  </g>
  <!-- Certificate medallion -->
  <g transform="translate(200 120)">
    <circle r="58" fill="url(#isoAccent)"/>
    <circle r="46" fill="none" stroke="#0a1929" stroke-width="2" stroke-opacity="0.4"/>
    <text y="-2" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="700" fill="#0a1929" letter-spacing="2">ISO</text>
    <text y="18" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800" fill="#0a1929">9001</text>
    <!-- Ribbon tails -->
    <path d="M-30 50 L-44 90 L-22 80 L-14 96 L0 60 Z" fill="#3461d6"/>
    <path d="M30 50 L44 90 L22 80 L14 96 L0 60 Z" fill="#1a3c8c"/>
  </g>
  <g transform="translate(20 240)">
    <rect width="110" height="36" rx="18" fill="#22c55e" fill-opacity="0.18" stroke="#22c55e" stroke-opacity="0.4"/>
    <circle cx="22" cy="18" r="8" fill="#22c55e"/>
    <path d="M17 18 l4 4 l8 -8" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <text x="38" y="23" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#86efac">Certified</text>
  </g>
  <text x="380" y="265" text-anchor="end" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="600" fill="#5d9fff">ISO 9001 · Quality</text>
</svg>
