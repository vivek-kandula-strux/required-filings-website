<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1320 480" role="img" aria-label="Filing service details cover">
  <defs>
    <linearGradient id="sdBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a1929"/>
      <stop offset="1" stop-color="#1a3c8c"/>
    </linearGradient>
    <linearGradient id="sdAccent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5d9fff"/>
      <stop offset="1" stop-color="#2d5bd8"/>
    </linearGradient>
    <pattern id="sdGrid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M0 0 H40 M0 0 V40" stroke="#4f8cff" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1320" height="480" fill="url(#sdBg)" rx="20"/>
  <rect width="1320" height="480" fill="url(#sdGrid)" rx="20"/>
  <!-- Decorative document fan, centered -->
  <g transform="translate(660 240)">
    <g transform="translate(-220 -130) rotate(-12 120 130)">
      <rect width="240" height="280" rx="14" fill="#ffffff" fill-opacity="0.08" stroke="#5d9fff" stroke-opacity="0.3"/>
      <rect width="240" height="40" rx="14" fill="#5d9fff" fill-opacity="0.25"/>
    </g>
    <g transform="translate(0 -160) rotate(0 120 140)">
      <rect width="240" height="300" rx="14" fill="#ffffff" fill-opacity="0.14" stroke="#5d9fff" stroke-opacity="0.45"/>
      <rect width="240" height="44" rx="14" fill="url(#sdAccent)"/>
      <circle cx="22" cy="22" r="9" fill="#ffffff" fill-opacity="0.95"/>
      <path d="M18 22 l3 3 l6 -6" stroke="#3461d6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <text x="40" y="28" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#ffffff">Filing</text>
      <rect x="20" y="64" width="80" height="8" rx="4" fill="#cdd9f1" fill-opacity="0.6"/>
      <rect x="20" y="82" width="180" height="6" rx="3" fill="#cdd9f1" fill-opacity="0.35"/>
      <rect x="20" y="96" width="140" height="6" rx="3" fill="#cdd9f1" fill-opacity="0.35"/>
      <rect x="20" y="124" width="60" height="8" rx="4" fill="#cdd9f1" fill-opacity="0.6"/>
      <rect x="20" y="142" width="180" height="6" rx="3" fill="#cdd9f1" fill-opacity="0.35"/>
      <rect x="20" y="156" width="120" height="6" rx="3" fill="#cdd9f1" fill-opacity="0.35"/>
      <rect x="20" y="200" width="100" height="32" rx="6" fill="#22c55e" fill-opacity="0.2" stroke="#22c55e" stroke-opacity="0.4"/>
      <text x="70" y="220" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="700" fill="#86efac">FILED ON TIME</text>
    </g>
    <g transform="translate(220 -130) rotate(12 120 130)">
      <rect width="240" height="280" rx="14" fill="#ffffff" fill-opacity="0.08" stroke="#5d9fff" stroke-opacity="0.3"/>
      <rect width="240" height="40" rx="14" fill="#5d9fff" fill-opacity="0.25"/>
    </g>
  </g>
  <!-- Floating shield -->
  <g transform="translate(140 120)">
    <circle cx="50" cy="50" r="50" fill="#ffffff" fill-opacity="0.08" stroke="#5d9fff" stroke-opacity="0.5"/>
    <path d="M50 18 L74 28 V50 C74 66 62 78 50 84 C38 78 26 66 26 50 V28 Z" fill="url(#sdAccent)"/>
    <path d="M38 50 l8 8 l16 -20" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
  <!-- Floating stat -->
  <g transform="translate(1040 110)">
    <rect width="180" height="80" rx="14" fill="#ffffff" fill-opacity="0.1" stroke="#5d9fff" stroke-opacity="0.4"/>
    <text x="20" y="32" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="700" fill="#86b7ff" letter-spacing="1.5">ON-TIME RATE</text>
    <text x="20" y="64" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800" fill="#ffffff">[TBD]%</text>
  </g>
  <g transform="translate(1040 220)">
    <rect width="180" height="80" rx="14" fill="#ffffff" fill-opacity="0.1" stroke="#5d9fff" stroke-opacity="0.4"/>
    <text x="20" y="32" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="700" fill="#86b7ff" letter-spacing="1.5">RESPONSE TIME</text>
    <text x="20" y="64" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800" fill="#ffffff">1 day</text>
  </g>
</svg>
