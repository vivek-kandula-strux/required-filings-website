<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 760" fill="none" role="img" aria-label="Compliance documents illustration">
  <defs>
    <linearGradient id="rfBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a3c8c" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#0a1929" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="rfCard" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#e8eefb" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="rfAccent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4f8cff"/>
      <stop offset="1" stop-color="#3461d6"/>
    </linearGradient>
    <linearGradient id="rfShield" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5d9fff"/>
      <stop offset="1" stop-color="#2d5bd8"/>
    </linearGradient>
    <pattern id="rfDots" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="#4f8cff" fill-opacity="0.35"/>
    </pattern>
  </defs>
  <rect width="600" height="760" fill="url(#rfBg)" rx="32"/>
  <rect width="600" height="760" fill="url(#rfDots)" rx="32" opacity="0.5"/>

  <!-- Background document card (tilted, behind) -->
  <g transform="translate(120 130) rotate(-8 200 240)">
    <rect width="360" height="440" rx="18" fill="url(#rfCard)" stroke="#cdd9f1" stroke-width="1.5"/>
    <rect x="36" y="50" width="200" height="14" rx="7" fill="#2d5bd8" fill-opacity="0.85"/>
    <rect x="36" y="80" width="280" height="8" rx="4" fill="#7a8aa8" fill-opacity="0.6"/>
    <rect x="36" y="100" width="240" height="8" rx="4" fill="#7a8aa8" fill-opacity="0.6"/>
    <rect x="36" y="120" width="260" height="8" rx="4" fill="#7a8aa8" fill-opacity="0.6"/>
    <rect x="36" y="180" width="180" height="8" rx="4" fill="#7a8aa8" fill-opacity="0.4"/>
    <rect x="36" y="200" width="220" height="8" rx="4" fill="#7a8aa8" fill-opacity="0.4"/>
    <rect x="36" y="220" width="200" height="8" rx="4" fill="#7a8aa8" fill-opacity="0.4"/>
    <rect x="36" y="280" width="100" height="32" rx="6" fill="#3461d6" fill-opacity="0.18"/>
    <rect x="148" y="280" width="100" height="32" rx="6" fill="#3461d6" fill-opacity="0.18"/>
    <rect x="36" y="340" width="288" height="8" rx="4" fill="#7a8aa8" fill-opacity="0.3"/>
    <rect x="36" y="360" width="240" height="8" rx="4" fill="#7a8aa8" fill-opacity="0.3"/>
  </g>

  <!-- Foreground document card (straight, on top) -->
  <g transform="translate(160 100)">
    <rect width="320" height="500" rx="20" fill="#ffffff" stroke="#3461d6" stroke-opacity="0.25" stroke-width="1.5"/>
    <rect width="320" height="64" rx="20" fill="url(#rfAccent)"/>
    <rect y="44" width="320" height="20" fill="url(#rfAccent)"/>
    <circle cx="36" cy="32" r="10" fill="#ffffff" fill-opacity="0.95"/>
    <path d="M30 32 l4 4 l8 -8" stroke="#3461d6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <text x="58" y="38" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#ffffff">Filing Acknowledgement</text>

    <rect x="32" y="100" width="100" height="9" rx="4" fill="#3461d6" fill-opacity="0.7"/>
    <rect x="32" y="120" width="256" height="7" rx="3" fill="#7a8aa8" fill-opacity="0.5"/>
    <rect x="32" y="135" width="220" height="7" rx="3" fill="#7a8aa8" fill-opacity="0.5"/>
    <rect x="32" y="150" width="240" height="7" rx="3" fill="#7a8aa8" fill-opacity="0.5"/>

    <rect x="32" y="184" width="80" height="9" rx="4" fill="#3461d6" fill-opacity="0.7"/>
    <rect x="32" y="204" width="256" height="7" rx="3" fill="#7a8aa8" fill-opacity="0.5"/>
    <rect x="32" y="219" width="200" height="7" rx="3" fill="#7a8aa8" fill-opacity="0.5"/>

    <!-- Status pill -->
    <rect x="32" y="252" width="120" height="36" rx="18" fill="#22c55e" fill-opacity="0.12" stroke="#22c55e" stroke-opacity="0.4"/>
    <circle cx="48" cy="270" r="6" fill="#22c55e"/>
    <path d="M44 270 l3 3 l7 -7" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <text x="62" y="275" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="600" fill="#15803d">Filed on time</text>

    <rect x="32" y="312" width="60" height="8" rx="4" fill="#7a8aa8" fill-opacity="0.55"/>
    <rect x="32" y="328" width="256" height="42" rx="6" fill="#f1f5fc"/>
    <text x="46" y="356" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700" fill="#0a1929">ARN-2026-XXXX-XXXX</text>

    <rect x="32" y="386" width="60" height="8" rx="4" fill="#7a8aa8" fill-opacity="0.55"/>
    <rect x="32" y="402" width="120" height="36" rx="6" fill="#f1f5fc"/>
    <text x="46" y="426" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" fill="#0a1929">[TBD: date]</text>
  </g>

  <!-- Floating shield (compliance badge) -->
  <g transform="translate(420 120)">
    <circle cx="50" cy="50" r="58" fill="#ffffff" stroke="#3461d6" stroke-opacity="0.15"/>
    <path d="M50 14 L80 26 V52 C80 70 66 84 50 92 C34 84 20 70 20 52 V26 Z" fill="url(#rfShield)"/>
    <path d="M37 50 l9 9 l18 -22" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- Floating mini stat card -->
  <g transform="translate(60 540)">
    <rect width="200" height="92" rx="14" fill="#ffffff" stroke="#cdd9f1" stroke-width="1.5"/>
    <circle cx="34" cy="46" r="20" fill="#3461d6" fill-opacity="0.12"/>
    <path d="M26 46 l6 6 l12 -14" stroke="#3461d6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <text x="66" y="42" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="600" fill="#7a8aa8" letter-spacing="1">ON-TIME RATE</text>
    <text x="66" y="68" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#0a1929">[TBD]%</text>
  </g>

  <!-- Floating tag badges -->
  <g transform="translate(440 360)">
    <rect width="80" height="32" rx="16" fill="#3461d6"/>
    <text x="40" y="21" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#ffffff">GST</text>
  </g>
  <g transform="translate(440 410)">
    <rect width="80" height="32" rx="16" fill="#1a3c8c"/>
    <text x="40" y="21" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#ffffff">ROC</text>
  </g>
  <g transform="translate(440 460)">
    <rect width="80" height="32" rx="16" fill="#0a1929"/>
    <text x="40" y="21" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#ffffff">ITR</text>
  </g>
</svg>
